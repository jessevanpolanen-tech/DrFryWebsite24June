<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dr. Fry — Sign in</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
:root{--porcelain:#FAFAFA;--porcelain-2:#F3F4F6;--graphite:#111315;--slate-800:#1F2937;--warm-200:#E5E7EB;--warm-500:#6B7280;--amber:#F2A23A;--amber-deep:#B45309;--red:#C0392B}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--porcelain-2);color:var(--graphite);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px}
a{color:var(--amber-deep);text-decoration:none}
a:hover{color:var(--graphite)}
.card{background:var(--porcelain);border:1px solid var(--warm-200);width:100%;max-width:400px;padding:44px 40px 36px}
.kicker{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--warm-500);margin-bottom:10px}
h1{font-family:'DM Serif Display',serif;font-weight:400;font-size:30px;line-height:1.15;margin-bottom:6px}
.sub{font-size:13px;color:var(--warm-500);margin-bottom:28px}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--warm-500);margin-bottom:8px}
input{width:100%;padding:12px 14px;border:1px solid var(--warm-200);background:var(--porcelain-2);font-size:14px;font-family:inherit;color:var(--graphite)}
input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
button{margin-top:18px;width:100%;padding:13px;border:none;background:var(--graphite);color:var(--porcelain);font-size:13px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:transform .18s ease,box-shadow .2s ease}
button:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(17,19,21,.16)}
button:active{transform:translateY(0)}
.err{display:none;margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red)}
.back{margin-top:26px;font-size:12px;color:var(--warm-500)}
</style>
</head>
<body>
<form class="card" id="loginForm">
<div class="kicker">Dr. Fry ProWave™ · Internal</div>
<h1>Team sign-in</h1>
<div class="sub">This dashboard is for the Dr.&nbsp;Fry team only.</div>
<label for="pw">Password</label>
<input id="pw" type="password" autocomplete="current-password" autofocus />
<button type="submit">Enter dashboard</button>
<div class="err" id="err">Incorrect password — try again.</div>
<div class="back"><a href="index.html">← Back to the website</a></div>
</form>
<script>
const HASH='7a7fadf43c9d05ba5d8151db686a5b81544aa196376e191c8f5bfde85e694994';
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
if(sessionStorage.getItem('df_auth')===HASH){location.replace(nextUrl());}
function nextUrl(){const n=new URLSearchParams(location.search).get('next');return(n&&/^[\w .-]+\.html$/.test(n))?n:'Dashboard.html'}
document.getElementById('loginForm').addEventListener('submit',async(e)=>{
e.preventDefault();
const h=await sha256(document.getElementById('pw').value);
if(h===HASH){sessionStorage.setItem('df_auth',h);location.replace(nextUrl());}
else{document.getElementById('err').style.display='block';document.getElementById('pw').select();}
});
</script>
</body>
</html>
